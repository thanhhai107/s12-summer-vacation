<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Joke Has Become The Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #e8f0fe;
  --surface: rgba(255,255,255,0.6);
  --text: #1a2a3a;
  --text-dim: #5a7a94;
  --green: #059669;
  --green-glow: rgba(5,150,105,0.20);
  --yellow: #ca8a04;
  --yellow-glow: rgba(202,138,4,0.20);
  --red: #dc2626;
  --red-glow: rgba(220,38,38,0.20);
  --accent: #0284c7;
  --accent-glow: rgba(2,132,199,0.25);
  --radius-lg: 24px; --radius: 16px; --radius-sm: 10px;
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;scrollbar-gutter:stable}
body{
  font-family:'Nunito','Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;justify-content:center;align-items:flex-start;
  padding:32px 16px;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

.bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-image{
  position:absolute;inset:0;
  background:linear-gradient(180deg, #ffedd5 0%, #fda4af 35%, #7dd3fc 70%, #0369a1 100%);
  filter:saturate(1.1);
}
.bg-waves{
  position:absolute;bottom:0;left:0;right:0;height:27vh;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 120' preserveAspectRatio='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,60 C200,10 400,110 600,60 C800,10 1000,110 1200,60 L1200,120 L0,120 Z' fill='rgba(255,255,255,0.25)'/%3E%3C/svg%3E") repeat-x;
  background-size:900px 27vh;
  animation:waveMove 12s linear infinite;
  z-index:2;
  will-change:transform;
}
@keyframes waveMove{from{background-position-x:0}to{background-position-x:-900px}}
.bg-waves2{
  position:absolute;bottom:0;left:0;right:0;height:33vh;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 120' preserveAspectRatio='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,60 C200,10 400,110 600,60 C800,10 1000,110 1200,60 L1200,120 L0,120 Z' fill='rgba(255,255,255,0.15)'/%3E%3C/svg%3E") repeat-x;
  background-size:700px 33vh;
  animation:waveMove2 18s linear infinite;
  z-index:1;
  will-change:transform;
}
@keyframes waveMove2{from{background-position-x:0}to{background-position-x:-700px}}
.bg-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,rgba(255,255,255,.25) 50%,rgba(255,255,255,.4) 85%,rgba(255,255,255,.15) 100%);
}
.bg-dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.12) 0.8px,transparent 0.8px);background-size:32px 32px}
.bg-mountains{
  position:absolute;bottom:29vh;left:0;right:0;height:20vh;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 120' preserveAspectRatio='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,120 L50,120 C80,60 100,30 150,30 C200,30 220,60 250,120 L350,120 C380,40 400,10 450,10 C500,10 520,40 550,120 L700,120 C730,70 750,40 800,40 C850,40 870,70 900,120 L950,120 C980,50 1000,20 1050,20 C1100,20 1120,50 1150,120 L1200,120 Z' fill='rgba(15,23,42,0.12)'/%3E%3C/svg%3E") repeat-x;
  background-size:1200px 20vh;
  z-index:-1;
  will-change:transform;
}
.bg-mist{
  position:absolute;bottom:25vh;left:0;right:0;height:15vh;
  background:linear-gradient(180deg,transparent 0%,rgba(255,255,255,0.45) 50%,rgba(255,255,255,0) 100%);
  filter:blur(8px);
  z-index:-1;
  pointer-events:none;
  will-change:transform;
  animation:mistDrift 20s ease-in-out infinite alternate;
}
@keyframes mistDrift{
  0%{transform:translate3d(-20px,0,0) scaleY(1);opacity:0.7}
  100%{transform:translate3d(20px,-5px,0) scaleY(1.1);opacity:0.9}
}
.fishing-village{
  position:absolute;bottom:29vh;z-index:-1;
  display:flex;align-items:flex-end;gap:2px;
  opacity:0.45;filter:blur(0.3px);
  will-change:transform;
  animation:villageBob 5s ease-in-out infinite alternate;
}
.village-1{left:15%;animation-delay:-1s}
.village-2{right:25%;animation-delay:-3s}
.fishing-village span{font-size:0.75rem}
@keyframes villageBob{
  0%{transform:translate3d(0,0,0)}
  100%{transform:translate3d(0,-2px,0)}
}

.container{
  position:relative;z-index:1;max-width:540px;width:100%;
  background:rgba(255,255,255,.92);
  border:1px solid rgba(255,255,255,.6);
  border-radius:32px;padding:40px 32px;
  box-shadow:0 8px 32px rgba(3,105,161,.12),0 20px 60px rgba(0,0,0,.08);
  animation:cardReveal .7s var(--ease) forwards;
}
@keyframes cardReveal{from{opacity:0;transform:translateY(40px)scale(.97)}to{opacity:1;transform:translateY(0)scale(1)}}
.header-icon-wrap{
  display:inline-flex;align-items:center;justify-content:center;
  width:72px;height:72px;border-radius:50%;
  background:rgba(255,255,255,0.45);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.6);
  box-shadow:0 8px 24px rgba(2,132,199,0.12);
  margin-bottom:12px;animation:iconBounce 3s ease-in-out infinite;
}

.header{text-align:center;margin-bottom:6px;position:relative}
.header-icon{font-size:36px;display:block;margin-bottom:4px}
.header h1{
  font-size:1.2rem;font-weight:800;letter-spacing:-.01em;line-height:1;
  background:linear-gradient(135deg,#0369a1 0%,#059669 50%,#b45309 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;white-space:nowrap
}
.header p{color:var(--text-dim);font-size:.78rem;font-weight:600;margin-top:2px}

.conn-wrap{text-align:center;margin-bottom:16px}
.conn-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:50px;font-size:.68rem;font-weight:600;letter-spacing:.02em}
.conn-badge.online{background:rgba(45,212,160,.1);color:var(--green);border:1px solid rgba(45,212,160,.15)}
.conn-badge.offline{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.15)}
.conn-badge.loading{background:rgba(240,192,64,.1);color:var(--yellow);border:1px solid rgba(240,192,64,.15)}
.conn-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.conn-dot.pulse{animation:dotPulse 1.8s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}

.brush-bar{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:24px;padding:10px 12px;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.6);border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.02)}
.brush-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:50px;font-size:.74rem;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .2s cubic-bezier(0.4,0,0.2,1);font-family:inherit;background:rgba(255,255,255,.6);color:var(--text-dim);user-select:none}
.brush-btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.9)}
.brush-btn.active-green{background:linear-gradient(135deg,rgba(45,212,160,.3),rgba(5,150,105,.45));border-color:rgba(45,212,160,.7);color:#065f46;box-shadow:0 4px 15px rgba(5,150,105,.25)}
.brush-btn.active-yellow{background:linear-gradient(135deg,rgba(253,224,71,.3),rgba(202,138,4,.4));border-color:rgba(250,204,21,.7);color:#854d0e;box-shadow:0 4px 15px rgba(202,138,4,.2)}
.brush-btn.active-red{background:linear-gradient(135deg,rgba(253,164,164,.3),rgba(220,38,38,.35));border-color:rgba(248,113,113,.7);color:#991b1b;box-shadow:0 4px 15px rgba(220,38,38,.18)}
.brush-btn.active-clear{background:rgba(241,245,249,.9);border-color:rgba(148,163,184,.4);color:#475569}
.brush-divider{width:1px;height:20px;background:rgba(2,132,199,.12);margin:0 2px}

.month-card{background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.6);border-radius:20px;padding:20px;margin-bottom:24px;box-shadow:0 4px 15px rgba(0,0,0,.02)}
.month-header{text-align:center;margin-bottom:14px}
.month-label{font-size:.9rem;font-weight:700;color:#0369a1;letter-spacing:.01em}

.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.dow-cell{text-align:center;font-size:.6rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;padding:3px 0;opacity:.4}
.date-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}

.date-card{
  position:relative;aspect-ratio:1;border-radius:14px;cursor:pointer;
  transition:all .25s cubic-bezier(0.4, 0, 0.2, 1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(255,255,255,.45);border:1.5px solid rgba(255,255,255,.5);
  user-select:none;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,.03)
}
.date-card:hover{
  background:rgba(255,255,255,.8);
  border-color:rgba(2,132,199,.35);
  box-shadow:0 8px 24px rgba(2,132,199,.15);
}
.date-card.brush-hover{
  transform:translateY(-3px) scale(1.06);
  box-shadow:0 10px 28px rgba(0,0,0,.18);
  z-index:2;
}
.date-card .day{font-size:.92rem;font-weight:700;line-height:1;position:relative;z-index:1;color:var(--text)}
.date-card .dow{font-size:.55rem;font-weight:500;opacity:.3;margin-top:1px;position:relative;z-index:1}

.date-card.status-green{
  background:linear-gradient(135deg, rgba(45,212,160,.25) 0%, rgba(5,150,105,.4) 100%);
  border-color:rgba(45,212,160,.6);
  box-shadow:0 4px 15px rgba(5,150,105,.18);
}
.date-card.status-green .day{color:#065f46}
.date-card.status-green .dow{opacity:.7;color:#047857}
.date-card.status-green:hover{
  background:linear-gradient(135deg, rgba(45,212,160,.4) 0%, rgba(5,150,105,.65) 100%);
  box-shadow:0 10px 30px rgba(5,150,105,.35);
}

.date-card.status-yellow{
  background:linear-gradient(135deg, rgba(253,224,71,.25) 0%, rgba(202,138,4,.4) 100%);
  border-color:rgba(250,204,21,.6);
  box-shadow:0 4px 15px rgba(202,138,4,.15);
}
.date-card.status-yellow .day{color:#854d0e}
.date-card.status-yellow .dow{opacity:.7;color:#a16207}
.date-card.status-yellow:hover{
  background:linear-gradient(135deg, rgba(253,224,71,.4) 0%, rgba(202,138,4,.65) 100%);
  box-shadow:0 10px 30px rgba(202,138,4,.3);
}

.date-card.status-red{
  background:linear-gradient(135deg, rgba(253,164,164,.25) 0%, rgba(220,38,38,.35) 100%);
  border-color:rgba(248,113,113,.6);
  box-shadow:0 4px 15px rgba(220,38,38,.12);
}
.date-card.status-red .day{color:#991b1b}
.date-card.status-red .dow{opacity:.7;color:#b91c1c}
.date-card.status-red:hover{
  background:linear-gradient(135deg, rgba(253,164,164,.4) 0%, rgba(220,38,38,.6) 100%);
  box-shadow:0 10px 30px rgba(220,38,38,.28);
}

.date-card.pop-anim{animation:cardPop .35s var(--ease)}
@keyframes cardPop{0%{transform:scale(1)}35%{transform:scale(1.18)}100%{transform:scale(1)}}
.empty-cell{visibility:hidden;pointer-events:none}

.btn-section{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:22px}
.btn{
  position:relative;overflow:hidden;
  padding:14px 16px;border-radius:16px;
  font-size:.85rem;font-weight:800;cursor:pointer;
  border:none;transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);
  font-family:inherit;text-align:center;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}
.btn::after{
  content:"";position:absolute;inset:0;transform:translateX(-100%);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.45),transparent);
  transition:transform 0.6s ease;
}
.btn:hover:not(:disabled){
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,.15);
}
.btn:hover:not(:disabled)::after{transform:translateX(100%)}
.btn:active:not(:disabled){
  transform:translateY(-1px);
}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none}
.btn-danger{
  background:linear-gradient(135deg,#fee2e2 0%,#fca5a5 100%);color:#b91c1c;
  border:1px solid rgba(239,68,68,.2);
}
.btn-danger:hover:not(:disabled){
  background:linear-gradient(135deg,#fecaca 0%,#f87171 100%);
  box-shadow:0 8px 20px rgba(239,68,68,.2);
}
.btn-undo{
  background:linear-gradient(135deg,#e0f2fe 0%,#bae6fd 100%);color:#0369a1;
  border:1px solid rgba(2,132,199,.2);
}
.btn-undo:hover:not(:disabled){
  background:linear-gradient(135deg,#bae6fd 0%,#7dd3fc 100%);
  box-shadow:0 8px 20px rgba(2,132,199,.25);
}
.btn-save{
  background:linear-gradient(135deg,#d1fae5 0%,#a7f3d0 100%);color:#065f46;
  border:1px solid rgba(16,185,129,.2);
}
.btn-save:hover:not(:disabled){
  background:linear-gradient(135deg,#a7f3d0 0%,#6ee7b7 100%);
  box-shadow:0 8px 20px rgba(5,150,105,.25);
}
.btn-save.dirty{
  background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#ffffff;
  border:1px solid transparent;
  animation:savePulse 2s ease-in-out infinite;
}
.btn-save.dirty:hover:not(:disabled){
  background:linear-gradient(135deg,#059669 0%,#047857 100%);
  box-shadow:0 8px 24px rgba(5,150,105,.4);
}
@keyframes savePulse{0%,100%{box-shadow:0 0 0 0 rgba(5,150,105,.4)}50%{box-shadow:0 0 0 8px rgba(5,150,105,.15)}}
.btn.btn-loading{pointer-events:none;opacity:.7}
.btn.btn-loading .btn-spinner{display:inline-block;animation:btnSpin .8s linear infinite}
@keyframes btnSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.results{
  background:rgba(255,255,255,.5);
  border:1px solid rgba(255,255,255,.6);
  border-radius:20px;padding:22px;min-height:60px;
  box-shadow:0 4px 15px rgba(0,0,0,.02);
}
.results h2{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:18px;color:var(--text-dim);display:flex;align-items:center;justify-content:space-between;width:100%}
.chart{display:flex;align-items:flex-end;gap:8px;padding:8px 0 0;min-height:140px;justify-content:center}
.chart-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;max-width:70px;min-width:42px}
.chart-bar-wrap{width:100%;flex:1;display:flex;flex-direction:column-reverse;align-items:center;min-height:100px;position:relative}
.chart-bar{width:100%;border-radius:6px 6px 0 0;min-height:4px;animation:barFill 0.8s cubic-bezier(0.22,1,0.36,1) forwards}
@keyframes barFill{from{height:0}to{height:var(--bar-height,0)}}
.chart-bar.green{background:linear-gradient(180deg,#2dd4a0,#059669)}
.chart-bar.yellow{background:linear-gradient(180deg,#f0c040,#ca8a04);height:0!important;display:none}
.chart-count{font-size:.7rem;font-weight:700;color:var(--text);line-height:1}
.chart-date{font-size:.62rem;font-weight:600;color:var(--text-dim);white-space:nowrap;text-align:center}
.chart-dow{font-size:.55rem;color:var(--text-dim);opacity:.5}
.results-empty{text-align:center;color:var(--text-dim);padding:28px;font-size:.85rem}
.results-empty .empty-icon{font-size:2.2rem;display:block;margin-bottom:8px;opacity:.4}

.modal-overlay{position:fixed;inset:0;background:rgba(4,12,22,.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;justify-content:center;align-items:center;z-index:1000;animation:modalFadeIn .25s ease}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(15,23,42,.92);color:#fff;padding:12px 24px;border-radius:50px;font-size:.85rem;font-weight:700;box-shadow:0 10px 25px rgba(0,0,0,.2);z-index:2000;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);opacity:0;animation:toastIn .35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;pointer-events:none}
@keyframes toastIn{to{transform:translateX(-50%) translateY(0);opacity:1}}
.modal-box{background:rgba(255,255,255,.98);border:1px solid rgba(255,255,255,.8);border-radius:22px;padding:30px 34px;min-width:360px;max-width:500px;box-shadow:0 20px 50px rgba(3,105,161,.15),0 10px 30px rgba(0,0,0,.04);text-align:center;animation:modalSlideIn .35s var(--ease)}
.modal-box p{font-size:.95rem;color:var(--text);margin-bottom:22px;line-height:1.6;font-weight:600}
.modal-box input[type="text"]{width:100%;padding:14px 18px;background:#f1f5f9;border:1.5px solid transparent;border-radius:12px;font-size:.95rem;font-weight:600;color:var(--text);outline:none;transition:all .25s;margin-bottom:22px;text-align:center;font-family:inherit}
.modal-box input[type="text"]::placeholder{color:#94a3b8}
.modal-box input[type="text"]:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow);background:#fff}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btn{padding:12px 28px;border-radius:50px;font-size:.88rem;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .25s var(--ease);font-family:inherit}
.modal-btn-primary{background:linear-gradient(135deg,var(--accent),#0ea5e9);color:#fff;box-shadow:0 4px 14px var(--accent-glow)}
.modal-btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--accent-glow)}
.modal-btn-primary:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.modal-btn-secondary{background:#f1f5f9;color:var(--text-dim);border-color:transparent}
.modal-btn-secondary:hover{background:#e2e8f0;color:var(--text)}
.login-hint{background:rgba(14,165,233,.06);border:1px solid rgba(14,165,233,.15);border-radius:12px;padding:14px 16px;margin-bottom:18px;text-align:left}
.login-hint .hint-title{font-size:.74rem;color:var(--text-dim);margin-bottom:4px}
.login-hint .hint-example{font-size:.82rem;line-height:1.6}
.login-hint .arrow{color:var(--text-dim)}
.login-hint .name-real{color:#0284c7;font-weight:600}
.login-hint .name-user{color:var(--green);font-weight:700}

/* Welcome box */
.welcome-box{background:rgba(255,255,255,.97);border-radius:24px;padding:28px 28px 24px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.1);border:1.5px solid rgba(2,132,199,.25);animation:welcomeIn .5s var(--ease)}
@keyframes welcomeIn{from{opacity:0;transform:translateY(-20px)scale(.95)}to{opacity:1;transform:translateY(0)scale(1)}}
.welcome-icon{font-size:40px;display:block;margin-bottom:4px}
.welcome-box .q{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.3}
.welcome-input{width:100%;padding:12px 14px;background:#f1f5f9;border:2px solid transparent;border-radius:12px;font-size:.92rem;font-weight:600;color:var(--text);outline:none;transition:all .25s;font-family:inherit;text-align:center;margin-bottom:10px}
.welcome-input::placeholder{color:#94a3b8;font-weight:400;font-size:.82rem}
.welcome-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px var(--accent-glow)}
.welcome-input.error{border-color:#dc2626;background:#fef2f2}
.welcome-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#0ea5e9);color:#fff;font-weight:700;font-size:.88rem;border:none;border-radius:12px;cursor:pointer;transition:all .25s var(--ease);font-family:inherit}
.welcome-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--accent-glow)}
.welcome-feedback{min-height:20px;font-size:.78rem;font-weight:600;margin:6px 0 2px}
.welcome-hint{font-size:.72rem;color:#94a3b8;margin-top:10px;line-height:1.5}
@keyframes modalFadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalSlideIn{from{opacity:0;transform:translateY(-50px)scale(.93)}to{opacity:1;transform:translateY(0)scale(1)}}

.picker-popup{
  position:fixed;z-index:900;
  background:rgba(255,255,255,.98);
  border:1px solid rgba(255,255,255,.8);
  border-radius:24px;padding:12px 10px;
  display:flex;gap:10px;align-items:center;
  box-shadow:0 12px 40px rgba(3,105,161,.18);
  animation:popIn .22s var(--ease);
}
.picker-popup .pick-btn{
  width:44px;height:44px;border-radius:50%;cursor:pointer;

<script>
const DOW_VI=['CN','T2','T3','T4','T5','T6','T7'],LS_API_KEY='travel_vote_api_url';
const VALID_NAMES=[
  'Nguyễn Thanh Hải','Đặng Thái Sơn','Nguyễn Xuân Mạnh','Hoàng Khánh Chi','Phạm Hoàng Phúc','Nguyễn Hoài Nam','Nguyễn Diệu Mai Vy','Đỗ Quang Cường',
  'Trần Bình Dương','Trần Thị Thanh Vân','Trần Trung Hậu','Vũ Mạnh Cường','Nguyễn Phước Ngưỡng Long','Tô Quang Huy','Trần Gia Khánh','Nguyễn Văn Lập',
  'Nguyễn Thúy Hằng','Nguyễn Thanh Tùng','Phạm Anh Tuấn','Chẩu Khánh Ly','Nguyễn Văn Thắng','Giang Tuấn Minh','Phạm Công Khang','Nguyễn Thị Thương',
  'Nguyễn Anh Hào','Hà Minh Thắng','Tô Tiến Đạt','Nguyễn Mai Thanh Thư','Đào Nắng Dịu','Nguyễn Hồng Dương','Chu Thị Phương Anh','Bùi Huyền Mi',
  'Kiều Đức Nam','Vũ Tiến Dũng','Nguyễn Phương Linh','Chung Thị Mai Anh','Cao Hương Giang','Đinh Nguyễn Tùng Khánh','Ngô Thị Tâm','Nguyễn Hoàng Hà Anh',
  'Lương Hữu Việt','Nguyễn Phương Nam','Chu Anh Trường','Nguyễn Duy Hải Bằng','Nguyễn Thị Ngọc Yến','Trần Hữu Huy Hoàng','Đào Minh Đức','Phạm Hà Anh'
];
function removeDiacritics(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/Đ/g,'D').replace(/\s+/g,'').toLowerCase()}
const USER_MAP={};for(const n of VALID_NAMES)USER_MAP[removeDiacritics(n)]=n;
let API_URL='',allData={},myStatuses={},stagedStatuses={},historyStack=[],isDirty=!1,userName='',displayName='',autoRefreshTimer=null,activeBrush=null;

function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2400)}
function setConnBadge(s,m){
  const b=document.getElementById('conn-badge');
  b.className='conn-badge '+s;
  if(s==='loading'){
    b.innerHTML=`<span class="loader-wave">🌊</span> ${m}`;
  }else{
    b.innerHTML=`<span class="conn-dot"></span> ${m}`;
  }
}
function updateDirty(){
  const b=document.getElementById('btn-save');
  if(!b)return;
  let allVoted=true;
  for(let d=1;d<=31;d++){
    if(!stagedStatuses[`2026-07-${String(d).padStart(2,'0')}`]){allVoted=false;break}
  }
  b.classList.toggle('dirty',isDirty&&allVoted);
  b.disabled=!allVoted;
}

async function apiCall(action,params,body){
  let url=API_URL+(API_URL.includes('?')?'&':'?')+'action='+encodeURIComponent(action);
  if(params)for(const[k,v]of Object.entries(params))url+='&'+encodeURIComponent(k)+'='+encodeURIComponent(v);
  const opts={method:body?'POST':'GET',redirect:'follow'};
  if(body){opts.body=JSON.stringify(body);opts.headers={'Content-Type':'text/plain'}}
  const resp=await fetch(url,opts);
  if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
  const text=await resp.text();
  try{return JSON.parse(text)}catch(e){throw new Error('Invalid response')}
}
async function apiGetAll(){const d=await apiCall('getAll');if(d.error)throw new Error(d.error);return d}
async function apiSave(statuses){const r=await apiCall('save',null,{userName,statuses});if(r.error)throw new Error(r.error);return r}
async function apiDeleteUser(user){const r=await apiCall('deleteUser',{user});if(r.error)throw new Error(r.error);return r}
async function apiResetAll(){const r=await apiCall('resetAll');if(r.error)throw new Error(r.error);return r}

function showModal(m){return new Promise(r=>{const o=document.createElement('div');o.className='modal-overlay';o.innerHTML=`<div class="modal-box"><p>${m}</p><div class="modal-btns"><button class="modal-btn modal-btn-primary" id="mo">Đã hiểu</button></div></div>`;document.body.appendChild(o);const b=o.querySelector('#mo');b.focus({preventScroll:true});const c=()=>{o.remove();r()};b.onclick=c;o.addEventListener('click',e=>{if(e.target===o)c()});o.addEventListener('keydown',e=>{if(e.key==='Escape')c()})})}
function showConfirm(m){return new Promise(r=>{const o=document.createElement('div');o.className='modal-overlay';o.innerHTML=`<div class="modal-box"><p>${m}</p><div class="modal-btns"><button class="modal-btn modal-btn-primary" id="my">Có</button><button class="modal-btn modal-btn-secondary" id="mn">Không</button></div></div>`;document.body.appendChild(o);o.querySelector('#my').focus({preventScroll:true});o.querySelector('#my').onclick=()=>{o.remove();r(!0)};o.querySelector('#mn').onclick=()=>{o.remove();r(!1)};o.addEventListener('keydown',e=>{if(e.key==='Escape'){o.remove();r(!1)}})})}
function showLogin(){return new Promise(r=>{const o=document.createElement('div');o.className='modal-overlay';o.style.background='rgba(4,12,22,.85)';o.style.backdropFilter='blur(20px)';o.innerHTML=`<div class="welcome-box"><div class="welcome-icon">⛵</div><div class="q">Tên đăng nhập của bạn là gì?</div><input type="text" class="welcome-input" id="login-input" placeholder="Ví dụ: nguyenthanhhai" autocomplete="off" autocorrect="off" autocapitalize="off"><button class="welcome-btn" id="login-confirm">Xác nhận</button><div id="login-feedback" class="welcome-feedback"></div><div class="welcome-hint">Họ và tên viết liền, không dấu, viết thường<br>Nguyễn Thanh Hải → <strong>nguyenthanhhai</strong></div></div>`;document.body.appendChild(o);const inp=o.querySelector('#login-input'),fb=o.querySelector('#login-feedback'),btn=o.querySelector('#login-confirm');inp.focus({preventScroll:true});btn.onclick=()=>{const v=inp.value.trim().toLowerCase();const rn=USER_MAP[v];if(rn){o.remove();r(rn)}else{fb.innerHTML='❌ Tên đăng nhập không đúng!';inp.classList.add('error');inp.select()}};inp.addEventListener('keydown',e=>{if(e.key==='Enter')btn.click()});inp.addEventListener('input',()=>{fb.innerHTML='';inp.classList.remove('error')})})}
function showPrompt(m,dv,ph){return new Promise(r=>{ph=ph||'Nhập...';const o=document.createElement('div');o.className='modal-overlay';o.innerHTML=`<div class="modal-box"><p>${m}</p><input type="text" id="modal-input" value="${dv||''}" placeholder="${ph}"><div class="modal-btns"><button class="modal-btn modal-btn-primary" id="mod-ok">Xác nhận</button><button class="modal-btn modal-btn-secondary" id="mod-cancel">Hủy</button></div></div>`;document.body.appendChild(o);const inp=o.querySelector('#modal-input'),bok=o.querySelector('#mod-ok');inp.focus({preventScroll:true});inp.select();const done=v=>{o.remove();r(v)};bok.onclick=()=>done(inp.value.trim());o.querySelector('#mod-cancel').onclick=()=>done(null);inp.addEventListener('keydown',e=>{if(e.key==='Enter')bok.click();if(e.key==='Escape')done(null)})})}

function parseSheetDate(s){
  const c=String(s).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(c))return c;
  const iso=c.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso)return `${iso[1]}-${iso[2]}-${iso[3]}`;
  const m=c.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{1,2})\s+(\d{4})/i);
  if(m){
    const mos={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
    const mo=String(mos[m[1].toLowerCase()]).padStart(2,'0');
    const d=String(m[2]).padStart(2,'0');
    const y=m[3];
    return `${y}-${mo}-${d}`;
  }
  const p=new Date(c);
  if(!isNaN(p.getTime())){
    const y=p.getFullYear();
    const mo=String(p.getMonth()+1).padStart(2,'0');
    const d=String(p.getDate()).padStart(2,'0');
    return `${y}-${mo}-${d}`;
  }
  return c;
}
function normalizeData(d){
  const res={};
  for(const[u,ss]of Object.entries(d)){
    res[u]={};
    for(const[dk,st]of Object.entries(ss))res[u][parseSheetDate(dk)]=st;
  }
  return res;
}
async function loadFromAPI(backgroundRefresh){
  setConnBadge('loading','Đang gom kèo...');
  try{
    const rawData=await apiGetAll();
    allData=normalizeData(rawData);
    const serverStatuses=allData[userName]||{};
    if(!backgroundRefresh){
      myStatuses=serverStatuses;
      stagedStatuses={...myStatuses};
      historyStack=[];
    }else{
      myStatuses=serverStatuses;
    }
    setConnBadge('online','Đã kết nối Google Sheets')
  }catch(e){
    setConnBadge('offline','Lỗi: '+e.message);
    throw e;
  }
}
async function saveToAPI(){setConnBadge('loading','Đang lưu kết quả...');try{await apiSave(myStatuses);allData[userName]={...myStatuses};setConnBadge('online','Đã lưu');toast('✅ Đã lưu')}catch(e){setConnBadge('offline','Lỗi: '+e.message);throw e}}
function setBrush(st){
  if(activeBrush===st){activeBrush=null}else{activeBrush=st}
  ['green','yellow','red','clear'].forEach(s=>{
    const b=document.getElementById('brush-'+s);
    if(b)b.className='brush-btn'+(activeBrush===s?' active-'+s:'');
  })
}
function applyBrushToCard(key,cardEl){
  if(!activeBrush)return;
  const st=activeBrush==='clear'?null:activeBrush;
  const cur=stagedStatuses[key]||null;
  if(cur===st)return;
  stageStatus(key,st);
  cardEl.classList.remove('status-green','status-yellow','status-red');
  if(st)cardEl.classList.add('status-'+st);
  cardEl.classList.add('pop-anim');
  cardEl.addEventListener('animationend',()=>cardEl.classList.remove('pop-anim'),{once:true});
}

function btnLoading(el,loading,label){
  if(loading){el.dataset.origLabel=el.textContent;el.innerHTML='<span class="btn-spinner">⏳</span> '+label;el.classList.add('btn-loading');el.disabled=true}
  else{el.textContent=el.dataset.origLabel||'';el.classList.remove('btn-loading');el.disabled=false}
}
async function handleSave(){
  if(!await showConfirm('Lưu tất cả thay đổi?'))return;
  const btn=document.getElementById('btn-save');
  btnLoading(btn,true,'Đang lưu...');
  myStatuses={...stagedStatuses};
  try{await apiSave(myStatuses);allData[userName]={...myStatuses};historyStack=[];isDirty=!1;setConnBadge('online','Đã lưu');toast('✅ Đã lưu trạng thái')}catch(e){await showModal('Lỗi lưu: '+e.message)}
  btnLoading(btn,false);updateDirty();renderAll()
}
async function handleClearAll(){
  if(Object.keys(myStatuses).length===0&&Object.keys(stagedStatuses).length===0){await showModal('Không có trạng thái nào để xoá.');return}
  if(!await showConfirm('Xoá bỏ toàn bộ trạng thái của tài khoản?'))return;
  const btn=document.querySelector('.btn-danger');
  btnLoading(btn,true,'Đang xoá...');
  setConnBadge('loading','Đang xoá...');
  try{await apiDeleteUser(userName);delete allData[userName];myStatuses={};stagedStatuses={};historyStack=[];isDirty=!1;setConnBadge('online','Đã xoá');toast('🗑 Đã xoá trạng thái tài khoản')}catch(e){setConnBadge('online','Lỗi');await showModal('Lỗi xoá: '+e.message)}
  btnLoading(btn,false);renderAll()
}
async function handleUndo(){
  if(!isDirty){await showModal('Không có thay đổi nào so với lần Xác nhận gần nhất.');return}
  if(!await showConfirm('Hoàn tác về trạng thái đã Xác nhận gần nhất?'))return
  stagedStatuses={...myStatuses};historyStack=[];isDirty=!1;
  updateDirty();renderAll();toast('↩ Đã hoàn tác')
}
async function handleResetAll(){
  if(!await showConfirm('⚠️ Xóa TOÀN BỘ dữ liệu tất cả mọi người? Không thể hoàn tác.'))return;
  try{await apiResetAll();allData={};myStatuses={};stagedStatuses={};historyStack=[];setConnBadge('online','Đã xóa toàn bộ');toast('🗑 Đã xóa tất cả dữ liệu');updateDirty()}catch(e){await showModal('Lỗi: '+e.message);return}
  renderAll()
}
async function handleSettings(){
  if(userName!=='nguyenthanhhai'){await showModal('Chỉ <strong>Nguyễn Thanh Hải</strong> mới có quyền cấu hình API.');return}
  const nu=await showPrompt('Dán URL Google Apps Script Web App:',API_URL,'https://script.google.com/macros/s/...');
  if(!nu)return;API_URL=nu.trim();localStorage.setItem(LS_API_KEY,API_URL);
  try{await loadFromAPI()}catch(e){await showModal('Không kết nối được:\n'+e.message)}
  renderAll()
}

function buildDowRow(id){document.getElementById(id).innerHTML=DOW_VI.map(d=>`<div class="dow-cell">${d}</div>`).join('')}
function generateCalendars(){
  const g=document.getElementById('grid-july');
  if(!g)return;
  const f=document.createDocumentFragment();
  const jl=new Date(2026,6,1);
  for(let i=0;i<jl.getDay();i++)f.appendChild(createEmptyCell());
  for(let d=1;d<=31;d++)f.appendChild(createDateCell(2026,7,d));
  g.innerHTML='';g.appendChild(f)
}
function stageStatus(key,status){
  const cur=stagedStatuses[key]||null;
  historyStack.push({key,from:cur,to:status||null});
  if(status)stagedStatuses[key]=status;else delete stagedStatuses[key];
  isDirty=!0;updateDirty()
}
function createEmptyCell(){const d=document.createElement('div');d.className='date-card empty-cell';return d}
function createDateCell(year,month,day){
  const key=`${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const st=stagedStatuses[key]||'',div=document.createElement('div');
  div.className='date-card'+(st?' status-'+st:'');div.dataset.date=key;
  div.innerHTML=`<div class="day">${day}</div>`;
  div.addEventListener('click',()=>applyBrushToCard(key,div));
  return div
}

function renderResults(){
  const div=document.getElementById('results'),totals={};
  for(const[,ss]of Object.entries(allData))for(const[dk,st]of Object.entries(ss)){
    if(!totals[dk])totals[dk]={green:0,yellow:0,red:0};totals[dk][st]=(totals[dk][st]||0)+1
  }
  const ent=Object.entries(totals);
  const tv=Object.keys(allData).length,tu=VALID_NAMES.length;

  if(ent.length===0){
    div.innerHTML='<div class="results-empty"><span class="empty-icon">📭</span>Chưa có bình chọn nào. Hãy là người đầu tiên!</div>'
    return
  }

  ent.sort((a,b)=>{const tg=b[1].green-a[1].green;if(tg)return tg;return(b[1].green+b[1].yellow+b[1].red)-(a[1].green+a[1].yellow+a[1].red)});
  const top5=ent.slice(0,5),maxG=Math.max(1,...top5.map(([,c])=>c.green));

  let h=`<h2>Top 5 ngày được chọn nhiều nhất <span style="text-transform:none;font-weight:600">${tv}/${tu} người đã bình chọn</span></h2>`;
  h+='<div class="chart">';
  for(const[dk,c]of top5){
    const d=new Date(dk),g=c.green||0,gh=Math.max(8,(g/maxG)*100);
    h+=`<div class="chart-col"><div class="chart-count">${g}</div><div class="chart-bar-wrap"><div class="chart-bar green" style="height:${gh}%; --bar-height: ${gh}%"></div></div><div class="chart-date">${d.getDate()}/${d.getMonth()+1}</div><div class="chart-dow">${DOW_VI[d.getDay()]}</div></div>`
  }
  h+='</div>';

  div.innerHTML=h
}

function generateSummaryCalendar(){
  const g=document.getElementById('grid-july-summary');
  if(!g)return;
  const totals={};
  for(const[,ss]of Object.entries(allData))for(const[dk,st]of Object.entries(ss)){
    if(!totals[dk])totals[dk]={green:0,yellow:0,red:0};totals[dk][st]=(totals[dk][st]||0)+1
  }
  const f=document.createDocumentFragment();
  const jl=new Date(2026,6,1);
  for(let i=0;i<jl.getDay();i++){const e=document.createElement('div');e.className='summary-cell empty-cell';f.appendChild(e)}
  for(let d=1;d<=31;d++){
    const key=`2026-${String(7).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const c=totals[key]||{green:0,yellow:0,red:0};
    const div=document.createElement('div');
    div.className='summary-cell';
    let countsHtml='';
    if(c.green||c.yellow||c.red){
      countsHtml='<div class="summary-counts">';
      if(c.green)countsHtml+=`<span class="sc sc-green">${c.green}</span>`;
      if(c.yellow)countsHtml+=`<span class="sc sc-yellow">${c.yellow}</span>`;
      if(c.red)countsHtml+=`<span class="sc sc-red">${c.red}</span>`;
      countsHtml+='</div>';
    }
    div.innerHTML=`<div class="day">${d}</div>${countsHtml}`;
    f.appendChild(div)
  }
  g.innerHTML='';g.appendChild(f);
  const vc=document.getElementById('voter-count');
  if(vc){const tv=Object.keys(allData).length,tu=VALID_NAMES.length;vc.textContent=`${tv}/${tu} người đã bình chọn`}
}
function renderAll(){generateCalendars();generateSummaryCalendar();updateDirty()}
async function refreshData(){try{await loadFromAPI(true);renderAll()}catch(e){}}

function spawnBubbles(){
  const container=document.querySelector('.bg-layer');
  if(!container)return;
  for(let i=0;i<15;i++){
    const bubble=document.createElement('div');
    bubble.className='bubble';
    bubble.style.left=Math.random()*100+'vw';
    bubble.style.width=bubble.style.height=(Math.random()*12+6)+'px';
    bubble.style.animationDelay=Math.random()*8+'s';
    bubble.style.animationDuration=(Math.random()*6+6)+'s';
    bubble.style.setProperty('--bubble-drift',(Math.random()*60-30)+'px');
    container.appendChild(bubble);
  }
}
function beachConfetti(){
  const emojis=['🌊','🏖️','🐚','🦀','☀️','🐠','⛵','🐟','🐙'];
  const container=document.body;
  for(let i=0;i<40;i++){
    const el=document.createElement('div');
    el.className='beach-confetti';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*100+'vw';
    el.style.top='-20px';
    el.style.fontSize=(Math.random()*1.5+1)+'rem';
    el.style.animation=`confettiFall ${Math.random()*3+2}s ease-out forwards`;
    el.style.setProperty('--spin',(Math.random()*720-360)+'deg');
    el.style.setProperty('--drift',(Math.random()*200-100)+'px');
    container.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }
}
async function initApp(){
  buildDowRow('dow-july');buildDowRow('dow-july-summary');
  spawnBubbles();
  const rn=await showLogin();
  displayName=rn;userName=removeDiacritics(rn);
  const DEFAULT_API='https://script.google.com/macros/s/AKfycbyzSHpL9XZIVGjiPjHQgIou35lH1IOUXtH9mdATKBLEYbn8w8rrUlgBDj1NvRqanyQu/exec';
  API_URL=localStorage.getItem(LS_API_KEY)||DEFAULT_API;
  if(!API_URL){document.getElementById('results').innerHTML='<div class="results-empty"><span class="empty-icon">⚠️</span>Cần cấu hình Google Sheets API.<br>Nhấn nút ⚙️ góc trên.</div>';generateCalendars();return}
  setConnBadge('loading','Đang tải lịch vote...');
  try{
    const rawData=await apiGetAll();
    allData=normalizeData(rawData);
    myStatuses=allData[userName]||{};if(!allData[userName])allData[userName]={};
    stagedStatuses={...myStatuses};historyStack=[];isDirty=!1;
    setConnBadge('online','Đã kết nối Google Sheets')
  }catch(e){setConnBadge('offline','Lỗi: '+e.message)}
  document.querySelector('.header p').innerHTML=`Xin chào <strong>${displayName}</strong>`;
  renderAll();autoRefreshTimer=setInterval(refreshData,30000);
  const lo=document.getElementById('loading-overlay');if(lo){lo.classList.add('hide');setTimeout(()=>lo.remove(),500)}
}
initApp();
</script>
